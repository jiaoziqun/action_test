name: git_Actions学习

on: 
  push

jobs:
  actions_test:
    name: 输出计算类示例打印结果
    runs-on: ubuntu-latest

    steps:
      - name: 读取仓库内容QAQ
        uses: actions/checkout@v4
      
      - name: 设置python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 打印当前地址
        run: |
          pwd
          ls
      
      - name: 检查python版本
        run: python --version
      
      - name: 安装环境
        run: |
          python -m pip install pytest
          pip install ruff
      
      - name: 代码审查
        run: ruff check .

      - name: 运行测试
        run: python -m pytest ./test_calculate.py -v
